<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" fill="#0f1726"/>
  <!-- Círculo decorativo -->
  <circle cx="256" cy="256" r="180" fill="rgba(34,197,94,0.12)"/>
  <!-- Carrinho de compras -->
  <g transform="translate(110, 120)">
    <!-- Corpo do carrinho -->
    <path d="M 0 0 L 20 0 L 60 180 L 250 180 L 290 60 L 55 60"
          fill="none" stroke="#22c55e" stroke-width="22"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Rodas -->
    <circle cx="95" cy="218" r="22" fill="#22c55e"/>
    <circle cx="210" cy="218" r="22" fill="#22c55e"/>
    <!-- Lista de itens (linhas) -->
    <line x1="95" y1="105" x2="255" y2="105" stroke="#22c55e" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
    <line x1="105" y1="140" x2="245" y2="140" stroke="#22c55e" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
